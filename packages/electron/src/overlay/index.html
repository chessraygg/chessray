<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ChessRay Overlay</title>
  <link rel="stylesheet" href="./overlay.css">
</head>
<body>
  <canvas id="video-overlay"></canvas>

  <div class="panel user-panel" id="user-panel">
    <div class="panel-header">
      <div class="panel-title">ChessRay</div>
      <div class="panel-controls">
        <button class="ctrl-btn chevron" id="cv-collapse-btn" title="Expand/Collapse">&#x25BC;</button>
        <button class="ctrl-btn close" id="cv-close-btn" title="Close">&#xD7;</button>
      </div>
    </div>

    <!-- Always visible: overlay toggle + key controls -->
    <div class="toggle-row compact" id="cv-main-toggles">
      <button class="toggle active" id="cv-overlay-btn">Overlay</button>
      <button class="toggle active" id="cv-eval-btn">Eval</button>
      <button class="toggle active" id="cv-line-btn">Line</button>
      <button class="toggle" id="cv-arrows-btn">Moves</button>
    </div>

    <div class="panel-body" id="cv-panel-body">
      <div class="status" id="cv-status">Waiting for source selection...</div>

      <div class="tracking-content" id="cv-tracking-content">
        <!-- Virtual board with SVG pieces -->
        <div class="board-frame">
          <div class="board-container">
            <div class="piece-grid" id="cv-debug-grid"></div>
            <canvas id="cv-arrow-canvas" width="200" height="200"></canvas>
          </div>
          <div class="board-status">
            <span class="turn-indicator" id="cv-turn-indicator">
              <span class="turn-dot white" id="cv-turn-dot"></span>
              <span id="cv-turn-text">White</span>
            </span>
            <span class="orientation-badge" id="cv-orientation-badge">
              <span class="orient-arrow" id="cv-pawn-dir"></span>
            </span>
          </div>
        </div>

        <!-- Eval bar -->
        <div class="eval-bar">
          <div class="eval-bar-fill" id="cv-eval-fill" style="width:50%"></div>
          <div class="eval-bar-label" id="cv-eval-label">0.0</div>
          <div class="eval-bar-depth" id="cv-eval-depth"></div>
        </div>

        <!-- Best moves -->
        <div class="best-moves" id="cv-best-moves"></div>

        <!-- Extra controls -->
        <div class="toggle-row compact">
          <button class="toggle" id="cv-notation-btn" title="Toggle SAN/UCI notation">SAN</button>
        </div>

        <div class="pv-depth-row" id="cv-pv-depth-row">
          <label>PV depth</label>
          <input type="range" id="cv-pv-depth" min="1" max="10" value="4">
          <span id="cv-pv-depth-val">4</span>
        </div>

        <!-- Debug section (inline, collapsible) -->
        <button class="debug-toggle" id="cv-debug-toggle">Debug &#x25B8;</button>
        <div class="debug-section hidden" id="debug-section">
          <div class="toggle-row">
            <button class="toggle" id="cv-border-btn">Box</button>
          </div>
          <img id="cv-debug-img" src="" alt="Board capture">
          <div class="fen" id="cv-debug-fen">Waiting...</div>
          <div class="debug-orient" id="cv-orientation-info"></div>
          <div class="meta" id="cv-debug-info"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./overlay.ts"></script>
</body>
</html>
