name: Release

# Triggered on every push to main (i.e., merged PRs).
# Version bump is determined by PR labels: "major", "minor", or "patch" (default).

on:
  push:
    branches: [main]

jobs:
  version:
    # Skip if this push is a version bump commit from this workflow (avoid infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'Release v')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine version bump from merged PR labels
        id: bump_type
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            // Find the PR that was just merged into main
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const merged = prs.find(pr => pr.merged_at && pr.base.ref === 'main');
            if (!merged) {
              core.info('No merged PR found for this commit — defaulting to patch');
              return 'patch';
            }
            const labels = merged.labels.map(l => l.name.toLowerCase());
            core.info(`PR #${merged.number} labels: ${labels.join(', ')}`);
            if (labels.includes('major')) return 'major';
            if (labels.includes('minor')) return 'minor';
            return 'patch';

      - name: Bump version and create tag
        id: bump
        run: |
          BUMP="${{ steps.bump_type.outputs.result }}"
          CURRENT="$(node -p "require('./package.json').version")"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEW="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac

          echo "Bumping $CURRENT → $NEW ($BUMP)"

          # Update all package.json files
          for pkg in package.json packages/*/package.json; do
            if [ -f "$pkg" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
                pkg.version = '$NEW';
                fs.writeFileSync('$pkg', JSON.stringify(pkg, null, 2) + '\n');
              "
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/*/package.json
          git commit -m "Release v$NEW"
          git tag -a "v$NEW" -m "v$NEW"
          git push
          git push origin "v$NEW"

          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            platform: darwin
          - os: macos-13
            arch: x64
            platform: darwin
          - os: windows-latest
            arch: x64
            platform: win32
          - os: ubuntu-latest
            arch: x64
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download vendor assets
        run: npm run setup

      - name: Build distributables
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p dist
          find packages/electron/out/make -type f \
            \( -name '*.dmg' -o -name '*.exe' -o -name '*.nupkg' \
               -o -name '*.deb' -o -name '*.zip' -o -name '*.msi' \) \
            -exec cp {} dist/ \;
          echo "Release assets:"
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chessray-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: find artifacts -type f | sort

      - name: Determine pre-release
        id: prerelease
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          if [[ "$VERSION" == 0.* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ChessRay ${{ needs.version.outputs.tag }}
          files: artifacts/**/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
